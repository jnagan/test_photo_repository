name: Update Photo List
on:
  push:
    paths:
      - 'photos/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Generate Photo List
        run: |
          echo "[" > photos.json
          for file in photos/*; do echo "\"$file\"," >> photos.json; done
          sed -i '$ s/,$//' photos.json
          echo "]" >> photos.json
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git fetch origin main
          git add photos.json
          git commit -m "Update photo list" || exit 0
          git push
